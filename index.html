<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Beyni</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 h-screen flex flex-col justify-center items-center p-4">

    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 w-full max-w-md text-center shadow-xl">
        <div class="text-4xl mb-3">🧞‍♂️</div>
        <h1 class="text-xl font-bold mb-1 text-indigo-400">Film Beyni</h1>
        <p class="text-slate-400 text-xs mb-4">Sihirli lambayı ovuştur, fikrini yaz.</p>
        
        <input type="text" id="userInput" placeholder="Fikrini yaz..." class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:border-indigo-500">
        <button onclick="lambayiOvustur()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 rounded-lg text-sm transition">Lambayı Ovuştur 🚀</button>
    </div>

    <script>
        function lambayiOvustur() {
            const val = document.getElementById('userInput').value;
            if(val) {
                alert("Sihirli lamba harekete geçti: " + val);
            } else {
                alert("Lütfen önce bir fikir yazın efendim!");
            }
        }
    </script>
</body>
</html>
