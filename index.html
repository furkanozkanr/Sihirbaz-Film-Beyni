<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Beyni - Sihirli Lamba Asistanı</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                🎬 Film Beyni
            </h1>
            <span class="text-xs bg-indigo-900/50 text-indigo-300 px-3 py-1 rounded-full border border-indigo-700/50">
                Sihirli Lamba Aktif
            </span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto p-4 w-full flex-grow flex flex-col justify-center items-center text-center">
        <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-8 shadow-xl max-w-lg w-full backdrop-blur-sm">
            <div class="text-5xl mb-4">🧞‍♂️</div>
            <h2 class="text-2xl font-semibold mb-2">Nasıl Yardımcı Olabilirim?</h2>
            <p class="text-slate-400 text-sm mb-6">Senaryo fikirlerin, karakter analizlerin veya film projelerin için sihirli lambayı ovuştur.</p>
            
            <div class="relative">
                <input type="text" placeholder="Bir fikir veya soru yaz..." class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition">
                <button class="mt-3 w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-xl transition shadow-lg shadow-indigo-600/20">
                    Lambayı Ovuştur 🚀
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 border-t border-slate-800 py-3 text-center text-xs text-slate-500">
        Film Beyni &copy; 2026 - Tüm Hakları Saklıdır.
    </footer>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker kaydedildi:', reg.scope))
                    .catch(err => console.log('Service Worker kaydı başarısız:', err));
            });
        }
    </script>
</body>
</html>
